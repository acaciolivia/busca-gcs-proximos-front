<!-- ── Toolbar ─────────────────────────────────────────────── -->
<mat-toolbar color="primary" class="toolbar-app">
  <mat-icon class="toolbar-icone">home_work</mat-icon>
  <span class="toolbar-titulo">IPF nos Lares</span>
  <span class="toolbar-subtitulo">Sistema de Gerenciamento de Endereços</span>
  <span class="toolbar-spacer"></span>
  <span class="toolbar-versao">v1.0</span>
</mat-toolbar>

<!-- ── Conteúdo principal ──────────────────────────────────── -->
<main class="conteudo-principal">
  <app-enderecos></app-enderecos>
</main>

<!-- ── Rodapé ─────────────────────────────────────────────── -->
<footer class="rodape">
  <span>IPF nos Lares &copy; {{ sAnoAtual }}</span>
  <mat-divider [vertical]="true" class="rodape-divider"></mat-divider>
  <span>Back-end: Spring Boot &nbsp;|&nbsp; Banco: PostgreSQL &nbsp;|&nbsp; Front-end: Angular</span>
</footer>
